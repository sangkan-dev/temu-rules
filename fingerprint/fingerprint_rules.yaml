- name: Laravel
  category: Framework
  confidence: 0.80
  cookies:
    laravel_session: ".*"
  headers:
    X-Powered-By: "(?i)PHP"
  implies: ["PHP"]

- name: Express
  category: Framework
  confidence: 0.85
  headers:
    X-Powered-By: "(?i)Express"
  implies: ["Node.js"]

- name: Node.js
  category: Language
  confidence: 0.75
  headers:
    X-Powered-By: "(?i)node\\.js(?:/([\\d.]+))?"
  version: "\\1"

- name: Next.js
  category: Framework
  confidence: 0.85
  headers:
    X-Powered-By: "(?i)Next\\.js"
  body:
    - "__NEXT_DATA__"
  implies: ["React", "Node.js"]

- name: Nuxt.js
  category: Framework
  confidence: 0.85
  body:
    - "__nuxt"
    - "__NUXT_DATA__"
  implies: ["Vue.js", "Node.js"]

- name: Spring
  category: Framework
  confidence: 0.75
