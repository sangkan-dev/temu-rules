# Temu Fingerprint Rules — Wappalyzer-style technology detection
# Format:
#   name: Technology name (string)
#   category: WebServer | Framework | Language | CMS | CDN | WAF | OS | Database | Library | Other
#   confidence: float 0.0–1.0
#   headers: { "Header-Name": "regex pattern (capture group 1 = version)" }
#   body: ["substring or regex to search in HTML body"]
#   meta: { "meta-name-attr": "regex on content attr (capture group 1 = version)" }
#   cookies: { "cookie-name": "regex on cookie value" }
#   version: "\\1"  # references first capture group from matched pattern
#   implies: ["Tech1", "Tech2"]  # auto-add when this rule matches

# ─────────────────────────────────────────────
# Web Servers
# ─────────────────────────────────────────────

- name: nginx
  category: WebServer
  confidence: 0.95
  headers:
    Server: "(?i)nginx(?:/([\\d.]+))?"
  version: "\\1"

- name: Apache
  category: WebServer
  confidence: 0.95
  headers:
    Server: "(?i)Apache(?:/([\\d.]+))?"
  version: "\\1"

