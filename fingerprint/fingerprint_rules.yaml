# ─────────────────────────────────────────────
# CMS
# ─────────────────────────────────────────────

- name: WordPress
  category: CMS
  confidence: 0.95
  meta:
    generator: "(?i)WordPress(?:\\s+([\\d.]+))?"
  version: "\\1"
  implies: ["PHP", "MySQL"]

- name: WordPress
  category: CMS
  confidence: 0.85
  body:
    - "wp-content/"
    - "wp-includes/"
  implies: ["PHP", "MySQL"]

- name: Drupal
  category: CMS
  confidence: 0.90
  meta:
    generator: "(?i)Drupal(?:\\s+([\\d.]+))?"
  body:
    - "sites/default/files"
    - "Drupal.settings"
  version: "\\1"
  implies: ["PHP"]

- name: Joomla
  category: CMS
  confidence: 0.90
  meta:
    generator: "(?i)Joomla!(?:\\s+([\\d.]+))?"
  body:
    - "/components/com_"
    - "/media/jui/"
  version: "\\1"
  implies: ["PHP"]

- name: Magento
  category: CMS
  confidence: 0.85
  body:
    - "Mage.Cookies"
    - "/skin/frontend/"
    - "var BLANK_URL"
  cookies:
    frontend: ".*"
  implies: ["PHP"]

- name: Ghost
  category: CMS
  confidence: 0.85
  meta:
    generator: "(?i)Ghost(?:\\s+([\\d.]+))?"
  body:
    - "ghost-url"
    - "/ghost/api/"
  version: "\\1"
  implies: ["Node.js"]

- name: Typo3
  category: CMS
  confidence: 0.85
  meta:
    generator: "(?i)TYPO3(?:\\s+CMS\\s+([\\d.]+))?"
  body:
    - "typo3/sysext"
  version: "\\1"
  implies: ["PHP"]

- name: Shopify
  category: CMS
  confidence: 0.90
  body:
    - "Shopify.theme"
    - "cdn.shopify.com"

- name: Wix
  category: CMS
  confidence: 0.90
