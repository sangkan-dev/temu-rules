  version: "\\1"

- name: ASP.NET
  category: Framework
  confidence: 0.95
  headers:
    X-AspNet-Version: "([\\d.]+)"
  version: "\\1"

- name: ASP.NET
  category: Framework
  confidence: 0.90
  headers:
    X-Powered-By: "(?i)ASP\\.NET"

- name: Ruby on Rails
  category: Framework
  confidence: 0.80
  headers:
    X-Powered-By: "(?i)Phusion Passenger(?:/([\\d.]+))?"
  cookies:
    _session_id: ".*"
  version: "\\1"

- name: Django
  category: Framework
  confidence: 0.75
  cookies:
    csrftoken: ".*"
  headers:
