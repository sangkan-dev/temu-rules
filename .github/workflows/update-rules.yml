name: Update Security Rules

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      rule_type:
        description: "Rules to update"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - fingerprint
          - vulnerability
          - network
          - dictionaries

permissions:
  contents: write
  pull-requests: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rules
        uses: actions/checkout@v4

      - name: Prepare upstream cache
        run: |
          mkdir -p upstream/fingerprint upstream/cve upstream/network upstream/dictionaries

      - name: Fetch fingerprint sources
        if: ${{ github.event_name == 'schedule' || inputs.rule_type == 'all' || inputs.rule_type == 'fingerprint' }}
        run: |
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/tomnomnom/wappalyzer/master/src/technologies/a.json \
            --output upstream/fingerprint/wappalyzer-technologies-a.json
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/0x727/FingerprintHub/main/web_fingerprint_v4.json \
            --output upstream/fingerprint/fingerprinthub-web-v4.json

      - name: Fetch recent CVE data
        if: ${{ github.event_name == 'schedule' || inputs.rule_type == 'all' || inputs.rule_type == 'vulnerability' }}
        run: |
          START_DATE="$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%S.000Z')"
          END_DATE="$(date -u '+%Y-%m-%dT%H:%M:%S.000Z')"
          curl --retry 5 --retry-delay 3 --retry-all-errors --fail --silent --show-error --location \
            "https://services.nvd.nist.gov/rest/json/cves/2.0/?lastModStartDate=${START_DATE}&lastModEndDate=${END_DATE}" \
            --output upstream/cve/recent.json

      - name: Fetch dictionary sources
        if: ${{ github.event_name == 'schedule' || inputs.rule_type == 'all' || inputs.rule_type == 'dictionaries' }}
        run: |
          curl --retry 5 --retry-delay 3 --retry-all-errors --fail --silent --show-error --location \
            https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/common.txt \
            --output upstream/dictionaries/seclists-web-common.txt
          curl --retry 5 --retry-delay 3 --retry-all-errors --fail --silent --show-error --location \
            https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/burp-parameter-names.txt \
            --output upstream/dictionaries/seclists-burp-parameter-names.txt
          curl --retry 5 --retry-delay 3 --retry-all-errors --fail --silent --show-error --location \
            https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/DNS/subdomains-top1million-5000.txt \
            --output upstream/dictionaries/seclists-subdomains-top5000.txt

      - name: Install validator dependencies
        run: |
          python3 -m pip install pyyaml

      - name: Promote safe upstream updates
        run: |
          python3 scripts/promote_upstream.py --rule-type "${{ inputs.rule_type || 'all' }}"

      - name: Validate repository
        run: |
          python3 scripts/validate_rules.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(rules): update upstream security rules"
          title: "chore(rules): update upstream security rules"
          body: |
            Automated rules-as-code refresh.

            Sources:
            - Wappalyzer technologies
            - FingerprintHub fingerprints
            - NVD CVE API recent changes
            - SecLists dictionary snapshots

            This workflow promotes low-risk upstream fingerprint and dictionary updates automatically, then validates all active rules before opening this PR.
          add-paths: |
            dictionaries/**
            fingerprint/**
            network/**
            vulnerability/**
            rules-manifest.json
            upstream/**
          branch: automated/rules-update
          delete-branch: true
