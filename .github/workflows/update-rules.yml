name: Update Security Rules

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      rule_type:
        description: "Rules to update"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - fingerprint
          - vulnerability
          - network

permissions:
  contents: write
  pull-requests: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rules
        uses: actions/checkout@v4

      - name: Prepare upstream cache
        run: |
          mkdir -p upstream/fingerprint upstream/cve upstream/network

      - name: Fetch fingerprint sources
        if: ${{ github.event_name == 'schedule' || inputs.rule_type == 'all' || inputs.rule_type == 'fingerprint' }}
        run: |
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/AliasIO/wappalyzer/master/src/technologies.json \
            --output upstream/fingerprint/wappalyzer-technologies.json
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/0x727/FingerprintHub/master/指纹库/fingerprint.yml \
            --output upstream/fingerprint/fingerprinthub.yml

      - name: Fetch recent CVE data
        if: ${{ github.event_name == 'schedule' || inputs.rule_type == 'all' || inputs.rule_type == 'vulnerability' }}
        run: |
          START_DATE="$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%S.000')"
          END_DATE="$(date -u '+%Y-%m-%dT%H:%M:%S.000')"
          curl --fail --silent --show-error --location \
            "https://services.nvd.nist.gov/rest/json/cves/2.0/?lastModStartDate=${START_DATE}&lastModEndDate=${END_DATE}" \
            --output upstream/cve/recent.json

      - name: Install validator dependencies
        run: |
          python3 -m pip install pyyaml

      - name: Validate repository
        run: |
          python3 scripts/validate_rules.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(rules): update upstream security rules"
          title: "chore(rules): update upstream security rules"
          body: |
            Automated rules-as-code refresh.

            Sources:
            - Wappalyzer technologies
            - FingerprintHub fingerprints
            - NVD CVE API recent changes

            Review upstream snapshots before promoting entries into first-party Temu rules.
          branch: automated/rules-update
          delete-branch: true
