  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nmm/damon/core: fix damos_walk() vs kdamond_fn() exit race\n\nWhen kdamond_fn()\
    \ main loop is finished, the function cancels remaining\ndamos_walk() request\
    \ and unset the damon_ctx->kdamond so that API callers\nand API functions themselves\
    \ can show the context is terminated. \ndamos_walk() adds the caller's request\
    \ to the queue first.  After that, it\nshows if the kdamond of the damon_ctx is\
    \ still running (damon_ctx->kdamond\nis set).  Only if the kdamond is running,\
    \ damos_walk() starts waiting for\nthe kdamond's handling of the newly added request.\n\
    \nThe damos_walk() requests registration and damon_ctx->kdamond unset are\nprotected\
    \ by different mutexes, though.  Hence, damos_walk() could race\nwith damon_ctx->kdamond\
    \ unset, and result in deadlocks.\n\nFor example, let's suppose kdamond successfully\
    \ finished the damow_walk()\nrequest cancelling.  Right after that, damos_walk()\
    \ is called for the\ncontext.  It registers the new request, and shows the context\
    \ is still\nrunning, because damon_ctx->kdamond unset is not yet done.  Hence\
    \ the\ndamos_walk() caller starts waiting for the handling of the request. \n\
    However, the kdamond is already on the termination steps, so it never\nhandles\
    \ the new request.  As a result, the damos_walk() caller thread\ninfinitely waits.\n\
    \nFix this by introducing another damon_ctx field, namely\nwalk_control_obsolete.\
    \  It is protected by the\ndamon_ctx->walk_control_lock, which protects damos_walk()\
    \ request\nregistration.  Initialize (unset) it in kdamond_fn() before letting\n\
    damon_start() returns and set it just before the cancelling of the\nremaining\
    \ damos_walk() request is executed.  damos_walk() reads the\nobsolete field under\
    \ the lock and avoids adding a new request.\n\nAfter this change, only requests\
    \ that are guaranteed to be handled or\ncancelled are registered.  Hence the after-registration\
    \ DAMON context\ntermination check is no longer needed.  Remove it together.\n\
    \nThe issue is found by sashiko [1]."
