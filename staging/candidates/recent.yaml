    \ A user can trigger this\n   repeatedly by writing \"1\" in a loop.\n\nFix both\
    \ leaks by moving the old_wi_state fetch before the input check,\nmaking it unconditional.\
    \  This also allows a unified early return for both\n\"true\" and \"false\" when\
