    \ up. dmesg showed:\n\n  rcu_tasks_wait_gp: rcu_tasks grace period number 85 (since\
    \ boot) is 10658 jiffies old.\n  rcu_tasks_wait_gp: rcu_tasks grace period number\
    \ 85 (since boot) is 40793 jiffies old.\n  rcu_tasks_wait_gp: rcu_tasks grace\
    \ period number 85 (since boot) is 131273 jiffies old.\n  rcu_tasks_wait_gp: rcu_tasks\
    \ grace period number 85 (since boot) is 402058 jiffies old.\n  INFO: rcu_tasks\
    \ detected stalls on tasks:\n  00000000769f52cd: .N nvcsw: 2/2 holdout: 1 idle_cpu:\
    \ -1/64\n  task:napi/eth2-8265  state:R  running task     stack:0     pid:48300\
    \ tgid:48300 ppid:2      task_flags:0x208040 flags:0x00004000\n  Call Trace:\n\
    \   <TASK>\n   ? napi_threaded_poll_loop+0x27c/0x2c0\n   ? __pfx_napi_threaded_poll+0x10/0x10\n\
    \   ? napi_threaded_poll+0x26/0x80\n   ? kthread+0xfa/0x240\n   ? __pfx_kthread+0x10/0x10\n\
    \   ? ret_from_fork+0x31/0x50\n   ? __pfx_kthread+0x10/0x10\n   ? ret_from_fork_asm+0x1a/0x30\n\
    \   </TASK>\n\nThe cause is that in threaded busypoll, the main loop is in\nnapi_threaded_poll\
    \ rather than napi_threaded_poll_loop, where the\nlatter rarely iterates more\
    \ than once within its loop. For\nrcu_softirq_qs_periodic inside napi_threaded_poll_loop\
    \ to report its\nqs state, the last_qs must be 100ms behind, and this can't happen\n\
    because napi_threaded_poll_loop rarely iterates in threaded busypoll,\nand each\
    \ time napi_threaded_poll_loop is called last_qs is reset to\nlatest jiffies.\n\
