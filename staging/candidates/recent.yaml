    \ for this device.\n\nIf CONFIG_PREEMPT_RT=y is set AND a packet has also been\
    \ received by\nthe MAC, then ks8851_rx_pkts() calls netdev_alloc_skb_ip_align()\
    \ to\nallocate SKBs for the received packets. If netdev_alloc_skb_ip_align()\n\
