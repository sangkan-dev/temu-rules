  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nipv6: rpl: reserve mac_len headroom when recompressed SRH grows\n\nipv6_rpl_srh_rcv()\
    \ decompresses an RFC 6554 Source Routing Header, swaps\nthe next segment into\
    \ ipv6_hdr->daddr, recompresses, then pulls the old\nheader and pushes the new\
    \ one plus the IPv6 header back.  The\nrecompressed header can be larger than\
    \ the received one when the swap\nreduces the common-prefix length the segments\
    \ share with daddr (CmprI=0,\nCmprE>0, seg[0][0] != daddr[0] gives the maximum\
    \ +8 bytes).\n\npskb_expand_head() was gated on segments_left == 0, so on earlier\n\
    segments the push consumed unchecked headroom.  Once skb_push() leaves\nfewer\
    \ than skb->mac_len bytes in front of data,\nskb_mac_header_rebuild()'s call to:\n\
    \n\tskb_set_mac_header(skb, -skb->mac_len);\n\nwill store (data - head) - mac_len\
    \ into the u16 mac_header field, which\nwraps to ~65530, and the following memmove()\
    \ writes mac_len bytes ~64KiB\npast skb->head.\n\nA single AF_INET6/SOCK_RAW/IPV6_HDRINCL\
    \ packet over lo with a two\nsegment type-3 SRH (CmprI=0, CmprE=15) reaches headroom\
    \ 8 after one\npass; KASAN reports a 14-byte OOB write in ipv6_rthdr_rcv.\n\n\
    Fix this by expanding the head whenever the remaining room is less than\nthe push\
    \ size plus mac_len, and request that much extra so the rebuilt\nMAC header fits\
    \ afterwards."
