    exploitdb_reference: false
  description: A heap buffer overflow vulnerability exists in the DTLS handshake fragment
    reassembly logic of GnuTLS. The issue arises in merge_handshake_packet() where
    incoming handshake fragments are matched and merged based solely on handshake
    type, without validating that the message_length field remains consistent across
    all fragments of the same logical message. An attacker can exploit this by sending
    crafted DTLS fragments with conflicting message_length values, causing the implementation
    to allocate a buffer based on a smaller initial fragment and subsequently write
    beyond its bounds using larger, inconsistent fragments. Because the merge operation
    does not enforce proper bounds checking against the allocated buffer size, this
    results in an out-of-bounds write on the heap. The vulnerability is remotely exploitable
    without authentication via the DTLS handshake path and can lead to application
    crashes or potential memory corruption.
  detection:
    payload: null
    verify: null
    review_required: Define a read-only matcher and classify execution risk before
