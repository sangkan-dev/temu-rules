  description: Lumiverse is a full-featured AI chat application. Prior to 0.9.7, consumeNonce()
    only checks that the module-level variable is set and unexpired. It does not validate
    any value from the incoming HTTP request or bind the nonce to the admin's session.
    If the admin's auth.api.signUpEmail() call fails before the before hook fires
    (e.g. BetterAuth rejects a duplicate email at the validation layer), the nonce
    is set but never consumed. Any POST /api/auth/sign-up/email request that arrives
    during the remaining window registers successfully regardless of who sent it.
    An attacker who can observe or predict when the admin is creating users (must
    be a dupplicate user) can race the 10-second window to register an unauthorized
    account. This vulnerability is fixed in 0.9.7.
