  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \napparmor: fix NULL pointer dereference in __unix_needs_revalidation\n\nWhen\
    \ receiving file descriptors via SCM_RIGHTS, both the socket pointer\nand the\
    \ socket's sk pointer can be NULL during socket setup or teardown,\ncausing NULL\
    \ pointer dereferences in __unix_needs_revalidation().\n\nThis is a regression\
    \ in AppArmor 5.0.0 (kernel 6.17+) where the new\n__unix_needs_revalidation()\
    \ function was added without proper NULL checks.\n\nThe crash manifests as:\n\
    \  BUG: kernel NULL pointer dereference, address: 0x0000000000000018\n  RIP: aa_file_perm+0xb7/0x3b0\
    \ (or +0xbe/0x3b0, +0xc0/0x3e0)\n  Call Trace:\n   apparmor_file_receive+0x42/0x80\n\
    \   security_file_receive+0x2e/0x50\n   receive_fd+0x1d/0xf0\n   scm_detach_fds+0xad/0x1c0\n\
    \nThe function dereferences sock->sk->sk_family without checking if either\nsock\
    \ or sock->sk is NULL first.\n\nAdd NULL checks for both sock and sock->sk before\
    \ accessing sk_family."
