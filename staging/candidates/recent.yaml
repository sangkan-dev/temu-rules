  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nirqchip/sifive-plic: Fix frozen interrupt due to affinity setting\n\nPLIC ignores\
    \ interrupt completion message for disabled interrupt, explained\nby the specification:\n\
    \n    The PLIC signals it has completed executing an interrupt handler by\n  \
    \  writing the interrupt ID it received from the claim to the\n    claim/complete\
    \ register. The PLIC does not check whether the completion\n    ID is the same\
    \ as the last claim ID for that target. If the completion\n    ID does not match\
    \ an interrupt source that is currently enabled for\n    the target, the completion\
    \ is silently ignored.\n\nThis caused problems in the past, because an interrupt\
    \ can be disabled\nwhile still being handled and plic_irq_eoi() had no effect.\
    \ That was fixed\nby checking if the interrupt is disabled, and if so enable it,\
    \ before\nsending the completion message. That check is done with irqd_irq_disabled().\n\
    \nHowever, that is not sufficient because the enable bit for the handling\nhart\
    \ can be zero despite irqd_irq_disabled(d) being false. This can happen\nwhen\
    \ affinity setting is changed while a hart is still handling the\ninterrupt.\n\
    \nThis problem is easily reproducible by dumping a large file to uart (which\n\
