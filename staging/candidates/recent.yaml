  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nscsi: target: Fix recursive locking in __configfs_open_file()\n\nIn flush_write_buffer,\
    \ &p->frag_sem is acquired and then the loaded store\nfunction is called, which,\
    \ here, is target_core_item_dbroot_store().  This\nfunction called filp_open(),\
    \ following which these functions were called\n(in reverse order), according to\
    \ the call trace:\n\n  down_read\n  __configfs_open_file\n  do_dentry_open\n \
    \ vfs_open\n  do_open\n  path_openat\n  do_filp_open\n  file_open_name\n  filp_open\n\
    \  target_core_item_dbroot_store\n  flush_write_buffer\n  configfs_write_iter\n\
    \ntarget_core_item_dbroot_store() tries to validate the new file path by\ntrying\
    \ to open the file path provided to it; however, in this case, the bug\nreport\
    \ shows:\n\ndb_root: not a directory: /sys/kernel/config/target/dbroot\n\nindicating\
    \ that the same configfs file was tried to be opened, on which it\nis currently\
    \ working on. Thus, it is trying to acquire frag_sem semaphore\nof the same file\
    \ of which it already holds the semaphore obtained in\nflush_write_buffer(), leading\
    \ to acquiring the semaphore in a nested manner\nand a possibility of recursive\
    \ locking.\n\nFix this by modifying target_core_item_dbroot_store() to use kern_path()\n\
    instead of filp_open() to avoid opening the file using filesystem-specific\nfunction\
    \ __configfs_open_file(), and further modifying it to make this fix\ncompatible."
