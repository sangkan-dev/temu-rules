  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \next4: don't set EXT4_GET_BLOCKS_CONVERT when splitting before submitting I/O\n\
    \nWhen allocating blocks during within-EOF DIO and writeback with\ndioread_nolock\
    \ enabled, EXT4_GET_BLOCKS_PRE_IO was set to split an\nexisting large unwritten\
    \ extent. However, EXT4_GET_BLOCKS_CONVERT was\nset when calling ext4_split_convert_extents(),\
    \ which may potentially\nresult in stale data issues.\n\nAssume we have an unwritten\
    \ extent, and then DIO writes the second half.\n\n   [UUUUUUUUUUUUUUUU] on-disk\
    \ extent        U: unwritten extent\n   [UUUUUUUUUUUUUUUU] extent status tree\n\
    \            |<-   ->| ----> dio write this range\n\nFirst, ext4_iomap_alloc()\
    \ call ext4_map_blocks() with\nEXT4_GET_BLOCKS_PRE_IO, EXT4_GET_BLOCKS_UNWRIT_EXT\
    \ and\nEXT4_GET_BLOCKS_CREATE flags set. ext4_map_blocks() find this extent and\n\
    call ext4_split_convert_extents() with EXT4_GET_BLOCKS_CONVERT and the\nabove\
    \ flags set.\n\nThen, ext4_split_convert_extents() calls ext4_split_extent() with\n\
    EXT4_EXT_MAY_ZEROOUT, EXT4_EXT_MARK_UNWRIT2 and EXT4_EXT_DATA_VALID2\nflags set,\
    \ and it calls ext4_split_extent_at() to split the second half\nwith EXT4_EXT_DATA_VALID2,\
    \ EXT4_EXT_MARK_UNWRIT1, EXT4_EXT_MAY_ZEROOUT\nand EXT4_EXT_MARK_UNWRIT2 flags\
    \ set. However, ext4_split_extent_at()\nfailed to insert extent since a temporary\
    \ lack -ENOSPC. It zeroes out\nthe first half but convert the entire on-disk extent\
    \ to written since\nthe EXT4_EXT_DATA_VALID2 flag set, but left the second half\
    \ as unwritten\nin the extent status tree.\n\n   [0000000000SSSSSS]  data    \
    \            S: stale data, 0: zeroed\n   [WWWWWWWWWWWWWWWW]  on-disk extent \
    \     W: written extent\n   [WWWWWWWWWWUUUUUU]  extent status tree\n\nFinally,\
    \ if the DIO failed to write data to the disk, the stale data in\nthe second half\
    \ will be exposed once the cached extent entry is gone.\n\nFix this issue by not\
    \ passing EXT4_GET_BLOCKS_CONVERT when splitting\nan unwritten extent before submitting\
    \ I/O, and make\next4_split_convert_extents() to zero out the entire extent range\n\
    to zero for this case, and also mark the extent in the extent status\ntree for\
    \ consistency."
