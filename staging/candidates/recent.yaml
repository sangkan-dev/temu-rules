  description: FastNetMon Community Edition through 1.2.9 contains an out-of-bounds
    read vulnerability in the NetFlow v9 data flowset processor. In src/netflow_plugin/netflow_v9_collector.cpp,
    the Data template branch (lines 1695-1702) iterates over flow records without
    performing a per-iteration bounds check against the packet end pointer. In contrast,
    the Options template branch (lines 1709-1719) correctly checks 'if (pkt + offset
    + field_template->total_length > packet_end)' before each iteration. The Data
    branch omits this check entirely. Since template definitions are sent by the network
    peer (and are unauthenticated UDP), an attacker can craft templates that cause
    the parser to read arbitrary memory past the packet buffer. This can leak sensitive
    memory contents or cause a crash.
