    \ write in the middle of it\nwithout dioread_nolock enabled, it will allocate\
    \ blocks as written\nextent.\n\n       0  A      B  N\n       [UUUUUUUUUUUU] on-disk\
    \ extent      U: unwritten extent\n       [UUUUUUUUUUUU] extent status tree\n\
    \       [--DDDDDDDD--]                     D: valid data\n          |<-  ->| ---->\
    \ this range needs to be initialized\n\next4_split_extent() first try to split\
    \ this extent at B with\nEXT4_EXT_DATA_PARTIAL_VALID1 and EXT4_EXT_MAY_ZEROOUT\
    \ flag set, but\next4_split_extent_at() failed to split this extent due to temporary\
    \ lack\nof space. It zeroout B to N and leave the entire extent as unwritten.\n\
    \n       0  A      B  N\n       [UUUUUUUUUUUU] on-disk extent\n       [UUUUUUUUUUUU]\
    \ extent status tree\n       [--DDDDDDDDZZ]                     Z: zeroed data\n\
    \next4_split_extent() then try to split this extent at A with\nEXT4_EXT_DATA_VALID2\
    \ flag set. This time, it split successfully and\nleave an written extent from\
    \ A to N.\n\n       0  A      B  N\n       [UUWWWWWWWWWW] on-disk extent     \
    \ W: written extent\n       [UUUUUUUUUUUU] extent status tree\n       [--DDDDDDDDZZ]\n\
    \nFinally ext4_map_create_blocks() only insert extent A to B to the extent\nstatus\
    \ tree, and leave an stale unwritten extent in the status tree.\n\n       0  A\
    \      B  N\n       [UUWWWWWWWWWW] on-disk extent      W: written extent\n   \
    \    [UUWWWWWWWWUU] extent status tree\n       [--DDDDDDDDZZ]\n\nFix this issue\
    \ by always cached extent status entry after zeroing out\nthe second part."
