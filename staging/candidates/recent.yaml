  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nmm/damon/core: clear walk_control on inactive context in damos_walk()\n\ndamos_walk()\
    \ sets ctx->walk_control to the caller-provided control\nstructure before checking\
    \ whether the context is running.  If the context\nis inactive (damon_is_running()\
    \ returns false), the function returns\n-EINVAL without clearing ctx->walk_control.\
    \  This leaves a dangling\npointer to a stack-allocated structure that will be\
    \ freed when the caller\nreturns.\n\nThis is structurally identical to the bug\
    \ fixed in commit f9132fbc2e83\n(\"mm/damon/core: remove call_control in inactive\
    \ contexts\") for\ndamon_call(), which had the same pattern of linking a control\
    \ object and\nreturning an error without unlinking it.\n\nThe dangling walk_control\
    \ pointer can cause:\n1. Use-after-free if the context is later started and kdamond\n\
    \_ \_dereferences ctx->walk_control (e.g., in damos_walk_cancel()\n\_ \_which\
    \ writes to control->canceled and calls complete())\n2. Permanent -EBUSY from\
    \ subsequent damos_walk() calls, since the\n\_ \_stale pointer is non-NULL\n\n\
    Nonetheless, the real user impact is quite restrictive.  The\nuse-after-free is\
    \ impossible because there is no damos_walk() callers who\nstarts the context\
    \ later.  The permanent -EBUSY can actually confuse\nusers, as DAMON is not running.\
    \  But the symptom is kept only while the\ncontext is turned off.  Turning it\
    \ on again will make DAMON internally\nuses a newly generated damon_ctx object\
    \ that doesn't have the invalid\ndamos_walk_control pointer, so everything will\
    \ work fine again.\n\nFix this by clearing ctx->walk_control under walk_control_lock\
    \ before\nreturning -EINVAL, mirroring the fix pattern from f9132fbc2e83."
