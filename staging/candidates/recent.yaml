    \   hlist_bl_first_rcu(head)\n    h->first  // read OOB!\n\nFix it by limiting\
    \ the minimal number of dentry_hashtable bucket to two,\nso that 'd_hash_shift'\
    \ won't exceeds the bit width of type u32."
