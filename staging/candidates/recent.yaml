    \ continues, walks log->entries or writes to log->data_start\n\nThe initialization\
    \ also has an incorrect order problem, as the fw_log\nis currently allocated after\
    \ MBX setup during initialization.\nFix the problems by adjusting the synchronization\
    \ order to put\ninitialization in place before the mailbox is enabled, and not\
    \ cleared\nuntil after the mailbox has been disabled."
