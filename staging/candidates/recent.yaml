  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nmedia: mtk-jpeg: fix use-after-free in release path due to uncancelled work\n\
    \nThe mtk_jpeg_release() function frees the context structure (ctx) without\n\
    first cancelling any pending or running work in ctx->jpeg_work. This\ncreates\
    \ a race window where the workqueue callback may still be accessing\nthe context\
    \ memory after it has been freed.\n\nRace condition:\n\n    CPU 0 (release)  \
    \                  CPU 1 (workqueue)\n    ----------------                   ------------------\n\
    \    close()\n      mtk_jpeg_release()\n                                     \
    \  mtk_jpegenc_worker()\n                                         ctx = work->data\n\
    \                                         // accessing ctx\n\n        kfree(ctx)\
    \  // freed!\n                                         access ctx  // UAF!\n\n\
    The work is queued via queue_work() during JPEG encode/decode operations\n(via\
    \ mtk_jpeg_device_run). If the device is closed while work is pending\nor running,\
    \ the work handler will access freed memory.\n\nFix this by calling cancel_work_sync()\
    \ BEFORE acquiring the mutex. This\nordering is critical: if cancel_work_sync()\
    \ is called after mutex_lock(),\nand the work handler also tries to acquire the\
    \ same mutex, it would cause\na deadlock.\n\nNote: The open error path does NOT\
    \ need cancel_work_sync() because\nINIT_WORK() only initializes the work structure\
    \ - it does not schedule\nit. Work is only scheduled later during ioctl operations."
