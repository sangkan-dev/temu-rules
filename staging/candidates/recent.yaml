  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nhfsplus: return error when node already exists in hfs_bnode_create\n\nWhen hfs_bnode_create()\
    \ finds that a node is already hashed (which should\nnot happen in normal operation),\
    \ it currently returns the existing node\nwithout incrementing its reference count.\
    \ This causes a reference count\ninconsistency that leads to a kernel panic when\
    \ the node is later freed\nin hfs_bnode_put():\n\n    kernel BUG at fs/hfsplus/bnode.c:676!\n\
    \    BUG_ON(!atomic_read(&node->refcnt))\n\nThis scenario can occur when hfs_bmap_alloc()\
    \ attempts to allocate a node\nthat is already in use (e.g., when node 0's bitmap\
    \ bit is incorrectly\nunset), or due to filesystem corruption.\n\nReturning an\
    \ existing node from a create path is not normal operation.\n\nFix this by returning\
    \ ERR_PTR(-EEXIST) instead of the node when it's\nalready hashed. This properly\
    \ signals the error condition to callers,\nwhich already check for IS_ERR() return\
    \ values."
