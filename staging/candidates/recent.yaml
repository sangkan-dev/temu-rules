    \ to accept user-provided raw HTML via a custom tooltip.formatter, the built-in\
    \ tooltip formatters conventionally perform HTML escaping automatically. This\
    \ case breaks that convention and\_may unexpectedly lead to script execution when\
    \ tooltips are displayed.\n\n\nUsers are recommended to upgrade to version 6.1.0\
