    handling of an EXE file causes that file to be blindly executed with the permissions
    of the invoker. This allows escaping Flatpak and Snap sandboxes, because MIME
    handlers are not intended for use by code interpreters and loaders. NOTE: some
    parties feel that this is not a bug to be addressed in Wine, because there is
