    \ has no such guard.\n\nFor 802.3ad and balance-xor modes, bond_xdp_check() returns\
    \ false when\nxmit_hash_policy is vlan+srcmac, because the 802.1q payload is usually\n\
    absent due to hardware offload.  This means a user can:\n\n1. Attach a native\
    \ XDP program to a bond in 802.3ad/balance-xor mode\n   with a compatible xmit_hash_policy\
    \ (e.g. layer2+3).\n2. Change xmit_hash_policy to vlan+srcmac while XDP remains\
    \ loaded.\n\nThis leaves bond->xdp_prog set but bond_xdp_check() now returning\
    \ false\nfor the same device.  When the bond is later destroyed, dev_xdp_uninstall()\n\
    calls bond_xdp_set(dev, NULL, NULL) to remove the program, which hits\nthe bond_xdp_check()\
    \ guard and returns -EOPNOTSUPP, triggering:\n\nWARN_ON(dev_xdp_install(dev, mode,\
    \ bpf_op, NULL, 0, NULL))\n\nFix this by rejecting xmit_hash_policy changes to\
    \ vlan+srcmac when an\nXDP program is loaded on a bond in 802.3ad or balance-xor\
    \ mode.\n\ncommit 39a0876d595b (\"net, bonding: Disallow vlan+srcmac with XDP\"\
    )\nintroduced bond_xdp_check() which returns false for 802.3ad/balance-xor\nmodes\
    \ when xmit_hash_policy is vlan+srcmac.  The check was wired into\nbond_xdp_set()\
    \ to reject XDP attachment with an incompatible policy, but\nthe symmetric path\
    \ -- preventing xmit_hash_policy from being changed to an\nincompatible value\
    \ after XDP is already loaded -- was left unguarded in\nbond_option_xmit_hash_policy_set().\n\
    \nNote:\ncommit 094ee6017ea0 (\"bonding: check xdp prog when set bond mode\")\n\
    later added a similar guard to bond_option_mode_set(), but\nbond_option_xmit_hash_policy_set()\
    \ remained unprotected."
