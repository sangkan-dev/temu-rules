    \ a forged non-zero BTH pad can still leave payload_size()\nnegative and pass\
    \ an underflowed value to later receive-path users.\n\nFix this by validating\
    \ pkt->paylen against the full minimum length\nrequired by payload_size(): header_size(pkt)\
    \ + bth_pad(pkt) +\nRXE_ICRC_SIZE."
