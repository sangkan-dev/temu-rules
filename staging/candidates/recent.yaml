    \ and uart_write() behave inconsistently when\nxmit_buf is NULL (which happens\
    \ for PORT_UNKNOWN ports that were\nnever properly initialized):\n\n- uart_write_room()\
    \ returns kfifo_avail() which can be > 0\n- uart_write() checks xmit_buf and returns\
    \ 0 if NULL\n\nThis inconsistency causes an infinite loop in drivers that rely\
