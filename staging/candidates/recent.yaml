  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nerofs: fix inline data read failure for ztailpacking pclusters\n\nCompressed\
    \ folios for ztailpacking pclusters must be valid before adding\nthese pclusters\
    \ to I/O chains. Otherwise, z_erofs_decompress_pcluster()\nmay assume they are\
    \ already valid and then trigger a NULL pointer\ndereference.\n\nIt is somewhat\
    \ hard to reproduce because the inline data is in the same\nblock as the tail\
    \ of the compressed indexes, which are usually read just\nbefore. However, it\
    \ may still happen if a fatal signal arrives while\nread_mapping_folio() is running,\
