  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nsmack: /smack/doi: accept previously used values\n\nWriting to /smack/doi a\
    \ value that has ever been\nwritten there in the past disables networking for\n\
    non-ambient labels.\nE.g.\n\n    # cat /smack/doi\n    3\n    # netlabelctl -p\
    \ cipso list\n    Configured CIPSO mappings (1)\n     DOI value : 3\n       mapping\
    \ type : PASS_THROUGH\n    # netlabelctl -p map list\n    Configured NetLabel\
    \ domain mappings (3)\n     domain: \"_\" (IPv4)\n       protocol: UNLABELED\n\
    \     domain: DEFAULT (IPv4)\n       protocol: CIPSO, DOI = 3\n     domain: DEFAULT\
    \ (IPv6)\n       protocol: UNLABELED\n\n    # cat /smack/ambient\n    _\n    #\
    \ cat /proc/$$/attr/smack/current\n    _\n    # ping -c1 10.1.95.12\n    64 bytes\
    \ from 10.1.95.12: icmp_seq=1 ttl=64 time=0.964 ms\n    # echo foo >/proc/$$/attr/smack/current\n\
    \    # ping -c1 10.1.95.12\n    64 bytes from 10.1.95.12: icmp_seq=1 ttl=64 time=0.956\
    \ ms\n    unknown option 86\n\n    # echo 4 >/smack/doi\n    # echo 3 >/smack/doi\n\
    !>  [  214.050395] smk_cipso_doi:691 cipso add rc = -17\n    # echo 3 >/smack/doi\n\
    !>  [  249.402261] smk_cipso_doi:678 remove rc = -2\n!>  [  249.402261] smk_cipso_doi:691\
    \ cipso add rc = -17\n\n    # ping -c1 10.1.95.12\n!!> ping: 10.1.95.12: Address\
    \ family for hostname not supported\n\n    # echo _ >/proc/$$/attr/smack/current\n\
    \    # ping -c1 10.1.95.12\n    64 bytes from 10.1.95.12: icmp_seq=1 ttl=64 time=0.617\
    \ ms\n\nThis happens because Smack keeps decommissioned DOIs,\nfails to re-add\
    \ them, and consequently refuses to add\nthe \u201Cdefault\u201D domain map:\n\
    \n    # netlabelctl -p cipso list\n    Configured CIPSO mappings (2)\n     DOI\
    \ value : 3\n       mapping type : PASS_THROUGH\n     DOI value : 4\n       mapping\
    \ type : PASS_THROUGH\n    # netlabelctl -p map list\n    Configured NetLabel\
    \ domain mappings (2)\n     domain: \"_\" (IPv4)\n       protocol: UNLABELED\n\
    !>  (no ipv4 map for default domain here)\n     domain: DEFAULT (IPv6)\n     \
    \  protocol: UNLABELED\n\nFix by clearing decommissioned DOI definitions and\n\
    serializing concurrent DOI updates with a new lock.\n\nAlso:\n- allow /smack/doi\
    \ to live unconfigured, since\n  adding a map (netlbl_cfg_cipsov4_map_add) may\
    \ fail.\n  CIPSO_V4_DOI_UNKNOWN(0) indicates the unconfigured DOI\n- add new DOI\
    \ before removing the old default map,\n  so the old map remains if the add fails\n\
    \n(2008-02-04, Casey Schaufler)"
