    \    debugfs_create_dir+0x1d/0x1c0\n    pinctrl_init+0x6d/0x140\n    do_one_initcall+0x6d/0x3d0\n\
    \    kernel_init_freeable+0x39f/0x460\n    kernel_init+0x2a/0x260\n\nThere will\
    \ be only one bucket in dentry_hashtable when dhash_entries is\nset as one, and\
    \ d_hash_shift is calculated as 32 by dcache_init(). Then,\nfollowing process\
    \ will access more than one buckets(which memory region\nis not allocated) in\
    \ dentry_hashtable:\n d_lookup\n  b = d_hash(hash)\n    dentry_hashtable + ((u32)hashlen\
    \ >> d_hash_shift)\n    // The C standard defines the behavior of right shift\
    \ amounts\n    // exceeding the bit width of the operand as undefined. The\n \
