  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \niommu/vt-d: Clear Present bit before tearing down context entry\n\nWhen tearing\
    \ down a context entry, the current implementation zeros the\nentire 128-bit entry\
    \ using multiple 64-bit writes. This creates a window\nwhere the hardware can\
    \ fetch a \"torn\" entry \u2014 where some fields are\nalready zeroed while the\
    \ 'Present' bit is still set \u2014 leading to\nunpredictable behavior or spurious\
    \ faults.\n\nWhile x86 provides strong write ordering, the compiler may reorder\
    \ writes\nto the two 64-bit halves of the context entry. Even without compiler\n\
    reordering, the hardware fetch is not guaranteed to be atomic with\nrespect to\
    \ multiple CPU writes.\n\nAlign with the \"Guidance to Software for Invalidations\"\
    \ in the VT-d spec\n(Section 6.5.3.3) by implementing the recommended ownership\
    \ handshake:\n\n1. Clear only the 'Present' (P) bit of the context entry first\
    \ to\n   signal the transition of ownership from hardware to software.\n2. Use\
    \ dma_wmb() to ensure the cleared bit is visible to the IOMMU.\n3. Perform the\
    \ required cache and context-cache invalidation to ensure\n   hardware no longer\
    \ has cached references to the entry.\n4. Fully zero out the entry only after\
    \ the invalidation is complete.\n\nAlso, add a dma_wmb() to context_set_present()\
    \ to ensure the entry\nis fully initialized before the 'Present' bit becomes visible."
