    \ register before\nasserting an interrupt. Since writer is re-read from hardware\
    \ on\nevery loop iteration, it can also be set to an out-of-range value\nafter\
    \ the loop has already started.\n\nThe root cause is that get_queue_reader() and\
    \ get_queue_writer() return\nraw readl() values that are passed directly into\
    \ get_queue_entry(),\nwhich computes:\n\n  queue_begin + reader * sizeof(struct\
    \ remote_input)\n\nwith no bounds check. This unchecked MMIO address is then passed\
    \ to\nmemcpy_fromio(), reading 8 bytes from unintended device registers.\nFor\
    \ sufficiently large values the address falls outside the PCI BAR\nmapping entirely,\
    \ triggering a machine check exception.\n\nFix by checking both indices against\
    \ REMOTE_QUEUE_SIZE at the top of\nthe loop body, before any call to get_queue_entry().\
    \ On an out-of-range\nvalue, reset the reader register to 0 via set_queue_reader()\
    \ before\nbreaking, so that normal queue operation can resume if the corrupted\n\
    hardware state is transient."
