  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nhwrng: core - use RCU and work_struct to fix race condition\n\nCurrently, hwrng_fill\
    \ is not cleared until the hwrng_fillfn() thread\nexits. Since hwrng_unregister()\
    \ reads hwrng_fill outside the rng_mutex\nlock, a concurrent hwrng_unregister()\
    \ may call kthread_stop() again on\nthe same task.\n\nAdditionally, if hwrng_unregister()\
    \ is called immediately after\nhwrng_register(), the stopped thread may have never\
    \ been executed. Thus,\nhwrng_fill remains dirty even after hwrng_unregister()\
    \ returns. In this\ncase, subsequent calls to hwrng_register() will fail to start\
    \ new\nthreads, and hwrng_unregister() will call kthread_stop() on the same\n\
    freed task. In both cases, a use-after-free occurs:\n\nrefcount_t: addition on\
    \ 0; use-after-free.\nWARNING: ... at lib/refcount.c:25 refcount_warn_saturate+0xec/0x1c0\n\
    Call Trace:\n kthread_stop+0x181/0x360\n hwrng_unregister+0x288/0x380\n virtrng_remove+0xe3/0x200\n\
    \nThis patch fixes the race by protecting the global hwrng_fill pointer\ninside\
    \ the rng_mutex lock, so that hwrng_fillfn() thread is stopped only\nonce, and\
    \ calls to kthread_run() and kthread_stop() are serialized\nwith the lock held.\n\
    \nTo avoid deadlock in hwrng_fillfn() while being stopped with the lock\nheld,\
    \ we convert current_rng to RCU, so that get_current_rng() can read\ncurrent_rng\
    \ without holding the lock. To remove the lock from put_rng(),\nwe also delay\
    \ the actual cleanup into a work_struct.\n\nSince get_current_rng() no longer\
    \ returns ERR_PTR values, the IS_ERR()\nchecks are removed from its callers.\n\
    \nWith hwrng_fill protected by the rng_mutex lock, hwrng_fillfn() can no\nlonger\
    \ clear hwrng_fill itself. Therefore, if hwrng_fillfn() returns\ndirectly after\
    \ current_rng is dropped, kthread_stop() would be called on\na freed task_struct\
    \ later. To fix this, hwrng_fillfn() calls schedule()\nnow to keep the task alive\
    \ until being stopped. The kthread_stop() call\nis also moved from hwrng_unregister()\
    \ to drop_current_rng(), ensuring\nkthread_stop() is called on all possible paths\
    \ where current_rng becomes\nNULL, so that the thread would not wait forever."
