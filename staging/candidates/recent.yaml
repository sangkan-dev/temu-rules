  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nnetfilter: nf_conncount: increase the connection clean up limit to 64\n\nAfter\
    \ the optimization to only perform one GC per jiffy, a new problem\nwas introduced.\
    \ If more than 8 new connections are tracked per jiffy the\nlist won't be cleaned\
