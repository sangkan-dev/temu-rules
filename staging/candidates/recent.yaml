  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nnet: ipv6: fix panic when IPv4 route references loopback IPv6 nexthop\n\nWhen\
    \ a standalone IPv6 nexthop object is created with a loopback device\n(e.g., \"\
    ip -6 nexthop add id 100 dev lo\"), fib6_nh_init() misclassifies\nit as a reject\
    \ route. This is because nexthop objects have no destination\nprefix (fc_dst=::),\
    \ causing fib6_is_reject() to match any loopback\nnexthop. The reject path skips\
    \ fib_nh_common_init(), leaving\nnhc_pcpu_rth_output unallocated. If an IPv4 route\
    \ later references this\nnexthop, __mkroute_output() dereferences NULL nhc_pcpu_rth_output\
    \ and\npanics.\n\nSimplify the check in fib6_nh_init() to only match explicit\
    \ reject\nroutes (RTF_REJECT) instead of using fib6_is_reject(). The loopback\n\
    promotion heuristic in fib6_is_reject() is handled separately by\nip6_route_info_create_nh().\
    \ After this change, the three cases behave\nas follows:\n\n1. Explicit reject\
    \ route (\"ip -6 route add unreachable 2001:db8::/64\"):\n   RTF_REJECT is set,\
    \ enters reject path, skips fib_nh_common_init().\n   No behavior change.\n\n\
    2. Implicit loopback reject route (\"ip -6 route add 2001:db8::/32 dev lo\"):\n\
    \   RTF_REJECT is not set, takes normal path, fib_nh_common_init() is\n   called.\
    \ ip6_route_info_create_nh() still promotes it to reject\n   afterward. nhc_pcpu_rth_output\
    \ is allocated but unused, which is\n   harmless.\n\n3. Standalone nexthop object\
    \ (\"ip -6 nexthop add id 100 dev lo\"):\n   RTF_REJECT is not set, takes normal\
    \ path, fib_nh_common_init() is\n   called. nhc_pcpu_rth_output is properly allocated,\
    \ fixing the crash\n   when IPv4 routes reference this nexthop."
