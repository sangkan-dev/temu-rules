  description: The Meta Field Block plugin for WordPress is vulnerable to Insecure
    Direct Object Reference in all versions up to, and including, 1.5.1. This is due
    to the plugin allowing users to specify arbitrary object IDs and object types
    via block attributes without validating whether the authenticated user has permission
    to access the requested object's metadata. This makes it possible for authenticated
    attackers, with Contributor-level access and above, to read arbitrary user meta,
    post meta, and term meta data from any object in the database. On sites using
    plugins that store sensitive data in meta fields (e.g., WooCommerce billing/shipping
    information), this could lead to the exposure of Personally Identifiable Information
    (PII) including names, email addresses, phone numbers, and physical addresses.
