  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nceph: fix num_ops off-by-one when crypto allocation fails\n\nmove_dirty_folio_in_page_array()\
    \ may fail if the file is encrypted, the\ndirty folio is not the first in the\
    \ batch, and it fails to allocate a\nbounce buffer to hold the ciphertext. When\
    \ that happens,\nceph_process_folio_batch() simply redirties the folio and flushes\
    \ the\ncurrent batch -- it can retry that folio in a future batch.\n\nHowever,\
    \ if this failed folio is not contiguous with the last folio that\ndid make it\
    \ into the batch, then ceph_process_folio_batch() has already\nincremented `ceph_wbc->num_ops`;\
    \ because it doesn't follow through and\nadd the discontiguous folio to the array,\
    \ ceph_submit_write() -- which\nexpects that `ceph_wbc->num_ops` accurately reflects\
    \ the number of\ncontiguous ranges (and therefore the required number of \"write\
    \ extent\"\nops) in the writeback -- will panic the kernel:\n\n    BUG_ON(ceph_wbc->op_idx\
    \ + 1 != req->r_num_ops);\n\nThis issue can be reproduced on affected kernels\
    \ by writing to\nfscrypt-enabled CephFS file(s) with a 4KiB-written/4KiB-skipped/repeat\n\
    pattern (total filesize should not matter) and gradually increasing the\nsystem's\
    \ memory pressure until a bounce buffer allocation fails.\n\nFix this crash by\
    \ decrementing `ceph_wbc->num_ops` back to the correct\nvalue when move_dirty_folio_in_page_array()\
    \ fails, but the folio already\nstarted counting a new (i.e. still-empty) extent.\n\
    \nThe defect corrected by this patch has existed since 2022 (see first\n`Fixes:`),\
    \ but another bug blocked multi-folio encrypted writeback until\nrecently (see\
    \ second `Fixes:`). The second commit made it into 6.18.16,\n6.19.6, and 7.0-rc1,\
    \ unmasking the panic in those versions. This patch\ntherefore fixes a regression\
    \ (panic) introduced by cac190c7674f."
