    \ > 0) {\n      written = tty->ops->write(...);\n      // written is always 0,\
    \ loop never exits\n  }\n\nFor example, caif_serial's handle_tx() enters an infinite\
    \ loop when\nused with PORT_UNKNOWN serial ports, causing system hangs.\n\nFix\
    \ by making uart_write_room() also check xmit_buf and return 0 if\nit's NULL,\
    \ consistent with uart_write().\n\nReproducer: https://gist.github.com/mrpre/d9a694cc0e19828ee3bc3b37983fde13"
