  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \next4: fix dirtyclusters double decrement on fs shutdown\n\nfstests test generic/388\
    \ occasionally reproduces a warning in\next4_put_super() associated with the dirty\
    \ clusters count:\n\n  WARNING: CPU: 7 PID: 76064 at fs/ext4/super.c:1324 ext4_put_super+0x48c/0x590\
    \ [ext4]\n\nTracing the failure shows that the warning fires due to an\ns_dirtyclusters_counter\
    \ value of -1. IOW, this appears to be a\nspurious decrement as opposed to some\
    \ sort of leak. Further tracing\nof the dirty cluster count deltas and an LLM\
    \ scan of the resulting\noutput identified the cause as a double decrement in\
    \ the error path\nbetween ext4_mb_mark_diskspace_used() and the caller\next4_mb_new_blocks().\n\
    \nFirst, note that generic/388 is a shutdown vs. fsstress test and so\nproduces\
    \ a random set of operations and shutdown injections. In the\nproblematic case,\
    \ the shutdown triggers an error return from the\next4_handle_dirty_metadata()\
    \ call(s) made from\next4_mb_mark_context(). The changed value is non-zero at\
    \ this point,\nso ext4_mb_mark_diskspace_used() does not exit after the error\n\
    bubbles up from ext4_mb_mark_context(). Instead, the former\ndecrements both cluster\
    \ counters and returns the error up to\next4_mb_new_blocks(). The latter falls\
    \ into the !ar->len out path\nwhich decrements the dirty clusters counter a second\
    \ time, creating\nthe inconsistency.\n\nTo avoid this problem and simplify ownership\
    \ of the cluster\nreservation in this codepath, lift the counter reduction to\
    \ a single\nplace in the caller. This makes it more clear that\next4_mb_new_blocks()\
    \ is responsible for acquiring cluster\nreservation (via ext4_claim_free_clusters())\
    \ in the !delalloc case\nas well as releasing it, regardless of whether it ends\
    \ up consumed\nor returned due to failure."
