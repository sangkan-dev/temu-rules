  description: "LangSmith Client SDKs provide SDK's for interacting with the LangSmith\
    \ platform. Prior to version 0.5.19 of the JavaScript SDK and version 0.7.31 of\
    \ the Python SDK, the LangSmith SDK's output redaction controls (hideOutputs in\
    \ JS, hide_outputs in Python) do not apply to streaming token events. When an\
    \ LLM run produces streaming output, each chunk is recorded as a new_token event\
    \ containing the raw token value. These events bypass the redaction pipeline entirely\
    \ \u2014 prepareRunCreateOrUpdateInputs (JS) and _hide_run_outputs (Python) only\
    \ process the inputs and outputs fields on a run, never the events array. As a\
    \ result, applications relying on output redaction to prevent sensitive LLM output\
    \ from being stored in LangSmith will still leak the full streamed content via\
    \ run events. Version 0.5.19 of the JavaScript SDK and version 0.7.31 of the Python\
    \ SDK fix the issue."
