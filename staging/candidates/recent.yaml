  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \natm: lec: fix null-ptr-deref in lec_arp_clear_vccs\n\nsyzkaller reported a null-ptr-deref\
    \ in lec_arp_clear_vccs().\nThis issue can be easily reproduced using the syzkaller\
    \ reproducer.\n\nIn the ATM LANE (LAN Emulation) module, the same atm_vcc can\
    \ be shared by\nmultiple lec_arp_table entries (e.g., via entry->vcc or entry->recv_vcc).\n\
    When the underlying VCC is closed, lec_vcc_close() iterates over all\nARP entries\
    \ and calls lec_arp_clear_vccs() for each matched entry.\n\nFor example, when\
    \ lec_vcc_close() iterates through the hlists in\npriv->lec_arp_empty_ones or\
    \ other ARP tables:\n\n1. In the first iteration, for the first matched ARP entry\
    \ sharing the VCC,\nlec_arp_clear_vccs() frees the associated vpriv (which is\
    \ vcc->user_back)\nand sets vcc->user_back to NULL.\n2. In the second iteration,\
    \ for the next matched ARP entry sharing the same\nVCC, lec_arp_clear_vccs() is\
    \ called again. It obtains a NULL vpriv from\nvcc->user_back (via LEC_VCC_PRIV(vcc))\
    \ and then attempts to dereference it\nvia `vcc->pop = vpriv->old_pop`, leading\
    \ to a null-ptr-deref crash.\n\nFix this by adding a null check for vpriv before\
    \ dereferencing\nit. If vpriv is already NULL, it means the VCC has been cleared\n\
    by a previous call, so we can safely skip the cleanup and just\nclear the entry's\
    \ vcc/recv_vcc pointers.\n\nThe entire cleanup block (including vcc_release_async())\
    \ is placed inside\nthe vpriv guard because a NULL vpriv indicates the VCC has\
    \ already been\nfully released by a prior iteration \u2014 repeating the teardown\
    \ would\nredundantly set flags and trigger callbacks on an already-closing socket.\n\
    \nThe Fixes tag points to the initial commit because the entry->vcc path has\n\
    been vulnerable since the original code. The entry->recv_vcc path was later\n\
    added by commit 8d9f73c0ad2f (\"atm: fix a memory leak of vcc->user_back\")\n\
    with the same pattern, and both paths are fixed here."
