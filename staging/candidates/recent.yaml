  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nRDMA/rxe: Validate pad and ICRC before payload_size() in rxe_rcv\n\nrxe_rcv()\
    \ currently checks only that the incoming packet is at least\nheader_size(pkt)\
    \ bytes long before payload_size() is used.\n\nHowever, payload_size() subtracts\
    \ both the attacker-controlled BTH pad\nfield and RXE_ICRC_SIZE from pkt->paylen:\n\
    \n  payload_size = pkt->paylen - offset[RXE_PAYLOAD] - bth_pad(pkt)\n        \
    \         - RXE_ICRC_SIZE\n\nThis means a short packet can still make payload_size()\
    \ underflow even\nif it includes enough bytes for the fixed headers. Simply requiring\n\
