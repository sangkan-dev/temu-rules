    \ hotplug layer.\n\nHowever, it inadvertently moved pci_lock_rescan_remove() outside\
    \ its\nintended scope in eeh_handle_normal_event(), leading to broken PCI\nerror\
    \ reporting and improper EEH event triggering. Specifically,\neeh_handle_normal_event()\
    \ acquired pci_lock_rescan_remove() before\ncalling eeh_pe_bus_get(), but eeh_pe_bus_get()\
    \ itself attempts to\nacquire the same lock internally, causing nested locking\
    \ and disrupting\nnormal EEH event handling paths.\n\nThis patch adds a boolean\
    \ parameter do_lock to _eeh_pe_bus_get(),\nwith two public wrappers:\n    eeh_pe_bus_get()\
    \ with locking enabled.\n    eeh_pe_bus_get_nolock() that skips locking.\n\nCallers\
    \ that already hold pci_lock_rescan_remove() now use\neeh_pe_bus_get_nolock()\
    \ to avoid recursive lock acquisition.\n\nAdditionally, pci_lock_rescan_remove()\
    \ calls are restored to the correct\nposition\u2014after eeh_pe_bus_get() and\
    \ immediately before iterating affected\nPEs and devices. This ensures EEH-triggered\
    \ PCI removes occur under proper\nbus rescan locking without recursive lock contention.\n\
    \nThe eeh_pe_loc_get() function has been split into two functions:\n    eeh_pe_loc_get(struct\
    \ eeh_pe *pe) which retrieves the loc for given PE.\n    eeh_pe_loc_get_bus(struct\
    \ pci_bus *bus) which retrieves the location\n    code for given bus.\n\nThis\
