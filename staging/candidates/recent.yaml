    \ will trigger the pending softirq processing,\nwhich may ultimately call the\
    \ .xmit callback ks8851_start_xmit_par().\nThe ks8851_start_xmit_par() will try\
    \ to lock struct ks8851_net_par\n.lock spinlock, which is already locked by ks8851_irq()\
    \ from which\nks8851_start_xmit_par() was called. This leads to a deadlock, which\n\
    is reported by the kernel, including a trace listed below.\n\nIf CONFIG_PREEMPT_RT\
    \ is not set, then since commit 0913ec336a6c0\n(\"net: ks8851: Fix deadlock with\
    \ the SPI chip variant\") the deadlock\ncan also be triggered without received\
    \ packet in the RX FIFO. The\npending softirqs will be processed on return from\n\
    spin_unlock_bh(&ks->statelock) in ks8851_irq(), which triggers the\ndeadlock as\
    \ well.\n\nFix the problem by disabling BH around critical sections, including\
    \ the\nIRQ handler, thus preventing the net_tx_action() softirq from triggering\n\
