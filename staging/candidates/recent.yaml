    in @rvf/set-get (used by @rvf/core to flatten incoming form data into a nested
    object) does not block the keys __proto__, constructor, or prototype when walking
    a path. Because field names in submitted form data are passed directly to setPath
    via preprocessFormData (and through parseFormData / validate), an attacker who
