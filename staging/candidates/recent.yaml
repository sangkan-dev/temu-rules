  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nsched/rt: Skip currently executing CPU in rto_next_cpu()\n\nCPU0 becomes overloaded\
    \ when hosting a CPU-bound RT task, a non-CPU-bound\nRT task, and a CFS task stuck\
    \ in kernel space. When other CPUs switch from\nRT to non-RT tasks, RT load balancing\
    \ (LB) is triggered; with\nHAVE_RT_PUSH_IPI enabled, they send IPIs to CPU0 to\
    \ drive the execution\nof rto_push_irq_work_func. During push_rt_task on CPU0,\n\
    if next_task->prio < rq->donor->prio, resched_curr() sets NEED_RESCHED\nand after\
    \ the push operation completes, CPU0 calls rto_next_cpu().\nSince only CPU0 is\
    \ overloaded in this scenario, rto_next_cpu() should\nideally return -1 (no further\
    \ IPI needed).\n\nHowever, multiple CPUs invoking tell_cpu_to_push() during LB\
    \ increments\nrd->rto_loop_next. Even when rd->rto_cpu is set to -1, the mismatch\
    \ between\nrd->rto_loop and rd->rto_loop_next forces rto_next_cpu() to restart\
    \ its\nsearch from -1. With CPU0 remaining overloaded (satisfying rt_nr_migratory\n\
    && rt_nr_total > 1), it gets reselected, causing CPU0 to queue irq_work to\nitself\
    \ and send self-IPIs repeatedly. As long as CPU0 stays overloaded and\nother CPUs\
    \ run pull_rt_tasks(), it falls into an infinite self-IPI loop,\nwhich triggers\
    \ a CPU hardlockup due to continuous self-interrupts.\n\nThe trigging scenario\
    \ is as follows:\n\n         cpu0                      cpu1                  \
    \  cpu2\n                                pull_rt_task\n                      \
    \        tell_cpu_to_push\n                 <------------irq_work_queue_on\nrto_push_irq_work_func\n\
    \       push_rt_task\n    resched_curr(rq)                                   pull_rt_task\n\
    \    rto_next_cpu                                     tell_cpu_to_push\n     \
    \                 <-------------------------- atomic_inc(rto_loop_next)\nrd->rto_loop\
    \ != next\n     rto_next_cpu\n   irq_work_queue_on\nrto_push_irq_work_func\n\n\
    Fix redundant self-IPI by filtering the initiating CPU in rto_next_cpu().\nThis\
    \ solution has been verified to effectively eliminate spurious self-IPIs\nand\
    \ prevent CPU hardlockup scenarios."
