  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nf2fs: fix IS_CHECKPOINTED flag inconsistency issue caused by concurrent atomic\
    \ commit and checkpoint writes\n\nDuring SPO tests, when mounting F2FS, an -EINVAL\
    \ error was returned from\nf2fs_recover_inode_page. The issue occurred under the\
    \ following scenario\n\nThread A                                     Thread B\n\
    f2fs_ioc_commit_atomic_write\n - f2fs_do_sync_file // atomic = true\n  - f2fs_fsync_node_pages\n\
    \    : last_folio = inode folio\n    : schedule before folio_lock(last_folio)\
    \ f2fs_write_checkpoint\n                                              - block_operations//\
    \ writeback last_folio\n                                              - schedule\
    \ before f2fs_flush_nat_entries\n    : set_fsync_mark(last_folio, 1)\n    : set_dentry_mark(last_folio,\
    \ 1)\n    : folio_mark_dirty(last_folio)\n    - __write_node_folio(last_folio)\n\
    \      : f2fs_down_read(&sbi->node_write)//block\n                           \
    \                   - f2fs_flush_nat_entries\n                               \
    \                 : {struct nat_entry}->flag |= BIT(IS_CHECKPOINTED)\n       \
    \                                       - unblock_operations\n               \
    \                                 : f2fs_up_write(&sbi->node_write)\n        \
    \                                     f2fs_write_checkpoint//return\n      : f2fs_do_write_node_page()\n\
    f2fs_ioc_commit_atomic_write//return\n                                       \
    \      SPO\n\nThread A calls f2fs_need_dentry_mark(sbi, ino), and the last_folio\
    \ has\nalready been written once. However, the {struct nat_entry}->flag did not\n\
    have the IS_CHECKPOINTED set, causing set_dentry_mark(last_folio, 1) and\nwrite\
    \ last_folio again after Thread B finishes f2fs_write_checkpoint.\n\nAfter SPO\
    \ and reboot, it was detected that {struct node_info}->blk_addr\nwas not NULL_ADDR\
    \ because Thread B successfully write the checkpoint.\n\nThis issue only occurs\
    \ in atomic write scenarios. For regular file\nfsync operations, the folio must\
    \ be dirty. If\nblock_operations->f2fs_sync_node_pages successfully submit the\
    \ folio\nwrite, this path will not be executed. Otherwise, the\nf2fs_write_checkpoint\
    \ will need to wait for the folio write submission\nto complete, as sbi->nr_pages[F2FS_DIRTY_NODES]\
    \ > 0. Therefore, the\nsituation where f2fs_need_dentry_mark checks that the {struct\n\
    nat_entry}->flag /wo the IS_CHECKPOINTED flag, but the folio write has\nalready\
    \ been submitted, will not occur.\n\nTherefore, for atomic file fsync, sbi->node_write\
    \ should be acquired\nthrough __write_node_folio to ensure that the IS_CHECKPOINTED\
    \ flag\ncorrectly indicates that the checkpoint write has been completed."
