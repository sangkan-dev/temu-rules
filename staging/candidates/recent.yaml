    with the victim's full OS privileges. This issue arises due to unfiltered deserialization
    of configuration attributes, insufficient sanitization of internal fields, and
    unsandboxed execution of downloaded kernels. The vulnerability bypasses the `trust_remote_code`
    security mechanism, is invisible to the victim, and exploits the standard documented
    usage pattern, making it particularly severe. Users are advised to upgrade to
    version 5.3.0 or later to mitigate this issue.
