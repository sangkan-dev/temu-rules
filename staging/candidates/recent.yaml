  description: 'Improper Certificate Validation vulnerability in Erlang OTP public_key
    (pubkey_cert and public_key modules) allows a DNS nameConstraints bypass via subject
    CommonName fallback in TLS hostname verification.


    Two flaws combine to allow a subordinate CA whose DNS nameConstraints are restricted
    (e.g. permitted;DNS:allowed.example.com) to issue a leaf certificate that an OTP
    TLS client accepts as a valid identity for an out-of-scope hostname (e.g. victim.example.com):


    First, pubkey_cert:validate_names/6 in lib/public_key/src/pubkey_cert.erl only
    checks SAN DNS entries against nameConstraints. Per RFC 5280, a permitted DNS
    subtree only restricts certificates that contain a DNS-typed name. A leaf with
    no subjectAltName therefore trivially satisfies any permitted;DNS:... constraint
    regardless of its subject commonName.


    Second, public_key:pkix_verify_hostname/3 in lib/public_key/src/public_key.erl
    falls back to the subject commonName when no subjectAltName is present, extracting
    id-at-commonName attributes as presented IDs and matching them against the reference
