  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \niommu/vt-d: Clear Present bit before tearing down PASID entry\n\nThe Intel VT-d\
    \ Scalable Mode PASID table entry consists of 512 bits (64\nbytes). When tearing\
    \ down an entry, the current implementation zeros the\nentire 64-byte structure\
    \ immediately using multiple 64-bit writes.\n\nSince the IOMMU hardware may fetch\
    \ these 64 bytes using multiple\ninternal transactions (e.g., four 128-bit bursts),\
    \ updating or zeroing\nthe entire entry while it is active (P=1) risks a \"torn\"\
    \ read. If a\nhardware fetch occurs simultaneously with the CPU zeroing the entry,\
    \ the\nhardware could observe an inconsistent state, leading to unpredictable\n\
    behavior or spurious faults.\n\nFollow the \"Guidance to Software for Invalidations\"\
    \ in the VT-d spec\n(Section 6.5.3.3) by implementing the recommended ownership\
    \ handshake:\n\n1. Clear only the 'Present' (P) bit of the PASID entry.\n2. Use\
    \ a dma_wmb() to ensure the cleared bit is visible to hardware\n   before proceeding.\n\
    3. Execute the required invalidation sequence (PASID cache, IOTLB, and\n   Device-TLB\
    \ flush) to ensure the hardware has released all cached\n   references.\n4. Only\
    \ after the flushes are complete, zero out the remaining fields\n   of the PASID\
    \ entry.\n\nAlso, add a dma_wmb() in pasid_set_present() to ensure that all other\n\
    fields of the PASID entry are visible to the hardware before the Present\nbit\
    \ is set."
