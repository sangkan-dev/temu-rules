  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nima: Fix stack-out-of-bounds in is_bprm_creds_for_exec()\n\nKASAN reported a\
    \ stack-out-of-bounds access in ima_appraise_measurement\nfrom is_bprm_creds_for_exec:\n\
    \nBUG: KASAN: stack-out-of-bounds in ima_appraise_measurement+0x12dc/0x16a0\n\
    \ Read of size 1 at addr ffffc9000160f940 by task sudo/550\nThe buggy address\
    \ belongs to stack of task sudo/550\nand is located at offset 24 in frame:\n \
    \ ima_appraise_measurement+0x0/0x16a0\nThis frame has 2 objects:\n  [48, 56) 'file'\n\
    \  [80, 148) 'hash'\n\nThis is caused by using container_of on the *file pointer.\
    \ This offset\ncalculation is what triggers the stack-out-of-bounds error.\n\n\
    In order to fix this, pass in a bprm_is_check boolean which can be set\ndepending\
    \ on how process_measurement is called. If the caller has a\nlinux_binprm pointer\
    \ and the function is BPRM_CHECK we can determine\nis_check and set it then. Otherwise\
    \ set it to false."
