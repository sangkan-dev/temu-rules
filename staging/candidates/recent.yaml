    This allows a remote attacker to submit unauthorized claims, leading to a compromise
    of data integrity within the OpenID Connect (OIDC) authorization flow. While a
    redirect URI allowlist acts as a compensating control, this vulnerability violates
    OIDC Core and Financial-grade API (FAPI) signing requirements.
