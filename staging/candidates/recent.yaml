  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nbpf: reject negative CO-RE accessor indices in bpf_core_parse_spec()\n\nCO-RE\
    \ accessor strings are colon-separated indices that describe a path\nfrom a root\
    \ BTF type to a target field, e.g. \"0:1:2\" walks through\nnested struct members.\
    \ bpf_core_parse_spec() parses each component with\nsscanf(\"%d\"), so negative\
    \ values like -1 are silently accepted.  The\nsubsequent bounds checks (access_idx\
    \ >= btf_vlen(t)) only guard the\nupper bound and always pass for negative values\
    \ because C integer\npromotion converts the __u16 btf_vlen result to int, making\
    \ the\ncomparison (int)(-1) >= (int)(N) false for any positive N.\n\nWhen -1 reaches\
    \ btf_member_bit_offset() it gets cast to u32 0xffffffff,\nproducing an out-of-bounds\
    \ read far past the members array.  A crafted\nBPF program with a negative CO-RE\
    \ accessor on any struct that exists in\nvmlinux BTF (e.g. task_struct) crashes\
    \ the kernel deterministically\nduring BPF_PROG_LOAD on any system with CONFIG_DEBUG_INFO_BTF=y\n\
    (default on major distributions).  The bug is reachable with CAP_BPF:\n\n BUG:\
    \ unable to handle page fault for address: ffffed11818b6626\n #PF: supervisor\
    \ read access in kernel mode\n #PF: error_code(0x0000) - not-present page\n Oops:\
    \ Oops: 0000 [#1] SMP KASAN NOPTI\n CPU: 0 UID: 0 PID: 85 Comm: poc Not tainted\
    \ 7.0.0-rc6 #18 PREEMPT(full)\n RIP: 0010:bpf_core_parse_spec (tools/lib/bpf/relo_core.c:354)\n\
    \ RAX: 00000000ffffffff\n Call Trace:\n  <TASK>\n  bpf_core_calc_relo_insn (tools/lib/bpf/relo_core.c:1321)\n\
    \  bpf_core_apply (kernel/bpf/btf.c:9507)\n  check_core_relo (kernel/bpf/verifier.c:19475)\n\
    \  bpf_check (kernel/bpf/verifier.c:26031)\n  bpf_prog_load (kernel/bpf/syscall.c:3089)\n\
    \  __sys_bpf (kernel/bpf/syscall.c:6228)\n  </TASK>\n\nCO-RE accessor indices\
    \ are inherently non-negative (struct member index,\narray element index, or enumerator\
    \ index), so reject them immediately\nafter parsing."
