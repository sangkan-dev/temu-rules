  description: "In the Linux kernel, the following vulnerability has been resolved:\n\
    \nmm/slab: return NULL early from kmalloc_nolock() in NMI on UP\n\nOn UP kernels\
    \ (!CONFIG_SMP), spin_trylock() is a no-op that\nunconditionally succeeds even\
    \ when the lock is already held. As a\nresult, kmalloc_nolock() called from NMI\
    \ context can re-enter the slab\nallocator and acquire n->list_lock that the interrupted\
    \ context is\nalready holding, corrupting slab state.\n\nWith CONFIG_DEBUG_SPINLOCK\
    \ on UP, the following BUG is triggered with\nthe slub_kunit test module:\n\n\
    \  BUG: spinlock trylock failure on UP on CPU#0, kunit_try_catch/243\n  [...]\n\
    \  Call Trace:\n   <NMI>\n   dump_stack_lvl+0x3f/0x60\n   do_raw_spin_trylock+0x41/0x50\n\
    \   _raw_spin_trylock+0x24/0x50\n   get_from_partial_node+0x120/0x4d0\n   ___slab_alloc+0x8a/0x4c0\n\
    \   kmalloc_nolock_noprof+0x164/0x310\n   [...]\n   </NMI>\n\nFix this by returning\
    \ NULL early when invoked from NMI on a UP kernel."
