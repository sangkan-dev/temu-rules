  description: libheif is a HEIF and AVIF file format decoder and encoder. In versions
    1.21.2 and prior, a crafted HEIF sequence file where the saiz box declares more
    samples than actually exist in the track's chunk table causes a heap-buffer-overflow
    (out-of-bounds read) in the SampleAuxInfoReader constructor. The SampleAuxInfoReader
    constructor iterates over saiz->get_num_samples() samples but doesn't validate
    that this count is consistent with the number of chunks in the chunks vector.
    When saiz declares more samples than the chunks cover, the loop increments current_chunk
    past chunks.size(), causing an out-of-bounds read on the chunks vector. The vulnerability
    is triggered during file parsing (heif_context_read_from_file) without any additional
    user interaction. Any application using libheif to open untrusted HEIF files is
    affected. This issue has been fixed in version 1.22.0.
